<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPERC CONTINUO - COMATPERU</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root { --primary: #1a252f; --success: #27ae60; --warning: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-card { background: white; width: 100%; max-width: 500px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; border-bottom: 5px solid var(--warning); }
        .content { padding: 20px; }
        .info-auto { font-size: 0.85rem; color: #555; background: #eef2f3; padding: 10px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid var(--primary); }
        
        /* Recuadro de Firma */
        #signature-pad { border: 2px dashed #ccc; border-radius: 8px; background: #fff; cursor: crosshair; touch-action: none; width: 100%; height: 200px; margin: 10px 0; }
        .signature-label { display: block; font-weight: bold; margin-top: 15px; color: var(--primary); }
        .btn-clear { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; cursor: pointer; float: right; }

        input, textarea { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        .epp-grid { display: grid; grid-template-columns: 1fr; gap: 10px; background: #fdfdfd; padding: 15px; border: 1px solid #eee; margin-top: 10px; border-radius: 8px; }
        .epp-item { display: flex; align-items: center; font-size: 0.9rem; cursor: pointer; padding: 5px 0; }
        .epp-item input { width: auto; margin-right: 12px; transform: scale(1.3); }

        .btn-submit { width: 100%; padding: 18px; background: var(--success); color: white; border: none; font-weight: bold; border-radius: 10px; cursor: pointer; font-size: 1.2rem; margin-top: 25px; }
        #loader-envio { display: none; text-align: center; color: var(--warning); font-weight: bold; padding: 10px; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <h1 style="margin:0; font-size: 1.4rem; letter-spacing: 1px;">IPERC CONTINUO</h1>
        <small>COMATPERU - SEGURIDAD Y SALUD EN EL TRABAJO</small>
    </div>

    <div class="content" id="main-form">
        <div class="info-auto">
            <div id="txtFecha"></div>
            <div>Lugar: <strong>Taller de producción COMATPERU</strong></div>
        </div>

        <label><b>1. Datos del Trabajador:</b></label>
        <input type="text" id="nombre" placeholder="Nombres y Apellidos completos">

        <label class="signature-label">2. Firme en el recuadro: <button class="btn-clear" id="clear">Limpiar</button></label>
        <canvas id="signature-pad"></canvas>

        <label><b>3. Actividad a desarrollar:</b></label>
        <textarea id="actividad" rows="3" placeholder="Describa su tarea aquí..."></textarea>

        <label style="margin-top:20px; display:block;"><b>4. Marque su EPP requerido:</b></label>
        <div class="epp-grid" id="eppChecklist">
            <label class="epp-item"><input type="checkbox" value="Casco con Barbiquejo"> Casco con Barbiquejo</label>
            <label class="epp-item"><input type="checkbox" value="Protección Visual (Lentes)"> Protección Visual (Lentes)</label>
            <label class="epp-item"><input type="checkbox" value="Careta de Soldar / Esmerilar"> Careta de Soldar / Esmerilar</label>
            <label class="epp-item"><input type="checkbox" value="Protección Auditiva"> Protección Auditiva</label>
            <label class="epp-item"><input type="checkbox" value="Protección Respiratoria"> Protección Respiratoria</label>
            <label class="epp-item"><input type="checkbox" value="Guantes de seguridad"> Guantes de seguridad</label>
            <label class="epp-item"><input type="checkbox" value="Zapato de seguridad"> Zapato de seguridad</label>
            <label class="epp-item"><input type="checkbox" value="Traje de protección"> Traje de protección</label>
        </div>
        
        <div id="loader-envio">Enviando formato a SSOMA...</div>
        <button class="btn-submit" id="btnFinalizar">ENVIAR IPERC FIRMADO</button>
    </div>
</div>

<script>
    // --- 1. CONFIGURACIÓN EMAILJS ---
    (function() {
        emailjs.init("TU_PUBLIC_KEY"); // REEMPLAZAR CON TU KEY
    })();

    // --- 2. LÓGICA DE LA FIRMA (CANVAS) ---
    const canvas = document.getElementById('signature-pad');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    // Ajustar tamaño del canvas
    function resizeCanvas() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#000';
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Eventos de dibujo (Mouse y Touch)
    function startDrawing(e) { drawing = true; draw(e); }
    function stopDrawing() { drawing = false; ctx.beginPath(); }
    
    function draw(e) {
        if (!drawing) return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || e.touches[0].clientX) - rect.left;
        const y = (e.clientY || e.touches[0].clientY) - rect.top;
        
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('touchstart', startDrawing);
    canvas.addEventListener('touchmove', draw);
    canvas.addEventListener('touchend', stopDrawing);
    document.getElementById('clear').onclick = () => ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Reloj
    setInterval(() => { document.getElementById('txtFecha').innerText = "Fecha/Hora: " + new Date().toLocaleString(); }, 1000);

    // --- 3. GENERAR PDF Y ENVIAR ---
    document.getElementById('btnFinalizar').onclick = async function() {
        const nombre = document.getElementById('nombre').value.trim();
        const actividad = document.getElementById('actividad').value.trim();
        
        if (!nombre || !actividad) return alert("Por favor complete nombre y actividad.");
        
        this.disabled = true;
        document.getElementById('loader-envio').style.display = "block";

        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const firmaImg = canvas.toDataURL('image/png');
            const epps = Array.from(document.querySelectorAll('#eppChecklist input:checked')).map(c => c.value);

            // PDF Diseño
            doc.setFillColor(26, 37, 47); doc.rect(0, 0, 210, 25, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(14);
            doc.text("IPERC CONTINUO - COMATPERU", 105, 12, { align: 'center' });
            doc.setFontSize(10); doc.text("SEGURIDAD Y SALUD EN EL TRABAJO", 105, 20, { align: 'center' });
            
            doc.setTextColor(0, 0, 0); doc.setFontSize(11);
            doc.text(`TRABAJADOR: ${nombre}`, 15, 40);
            doc.text(`FECHA: ${new Date().toLocaleString()}`, 15, 48);
            doc.text(`LUGAR: Taller de producción COMATPERU`, 15, 56);
            
            doc.text("ACTIVIDAD:", 15, 70);
            doc.setFontSize(10); doc.text(actividad, 15, 78, { maxWidth: 180 });

            doc.setFontSize(11); doc.text("EPP DECLARADO:", 15, 110);
            let y = 118;
            epps.forEach(e => { doc.text(`[X] ${e}`, 20, y); y += 8; });

            // Insertar Firma
            doc.text("FIRMA DEL TRABAJADOR:", 140, 110);
            doc.addImage(firmaImg, 'PNG', 140, 115, 50, 25);
            doc.line(140, 140, 190, 140); // Línea de firma

            // Envío
            const pdfBase64 = doc.output('datauristring').split(',')[1];
            await emailjs.send('TU_SERVICE_ID', 'TU_TEMPLATE_ID', {
                nombre_trabajador: nombre,
                destinatario: "ssoma@corporacioncomat.com",
                content_base64: pdfBase64
            });
            
            alert("✅ IPERC Firmado y enviado exitosamente.");
            location.reload();

        } catch (error) {
            alert("Error al enviar: " + error);
            this.disabled = false;
            document.getElementById('loader-envio').style.display = "none";
        }
    };
</script>
</body>
</html>
